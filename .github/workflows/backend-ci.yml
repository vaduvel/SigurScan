name: Backend CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      PRIVACY_SAFE_MODE: "false"
      ENABLE_CLOUD_AI_EXPLANATION: "false"
      ENABLE_MISTRAL_SHADOW_ADJUDICATION: "false"
      INVOICE_CACHE_HMAC_KEY: "ci-test-hmac-key"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the production image: backend/Dockerfile pins python:3.12.13.
          python-version: "3.12"

      - name: Guard tracked local secrets
        run: python tools/guard_no_tracked_secrets.py

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

      - name: Offline evaluation (eval gate)
        working-directory: backend
        # Hermetic run: no redirect resolution, no external reputation calls.
        # Floors are intentionally NOT armed yet -- this prints the baseline
        # precision/recall/F1 so the gate can be set from real numbers. Once the
        # baseline is known, arm it by appending e.g. `--fail-under-f1 0.NN`.
        run: |
          python eval/evaluate.py \
            --dataset data/evaluation_dataset_v1.jsonl \
            --disable-redirects \
            --disable-reputation
