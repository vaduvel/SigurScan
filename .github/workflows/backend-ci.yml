name: Backend CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      PRIVACY_SAFE_MODE: "false"
      ENABLE_CLOUD_AI_EXPLANATION: "false"
      ENABLE_MISTRAL_SHADOW_ADJUDICATION: "false"
      OFFER_THREAT_ENRICHMENT_SHADOW: "false"
      INVOICE_CACHE_HMAC_KEY: "ci-test-hmac-key"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard tracked local secrets
        run: python tools/guard_no_tracked_secrets.py

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install pytest pytest-asyncio

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

  docker-smoke:
    name: Docker build + import/boot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IMAGE_TAG: "sigurscan-backend:ci"
      BUILD_CONTEXT: backend
      PORT: "8080"
      # Minimal runtime env so the app can boot in CI (mirrors the `test` job).
      PRIVACY_SAFE_MODE: "false"
      ENABLE_CLOUD_AI_EXPLANATION: "false"
      ENABLE_MISTRAL_SHADOW_ADJUDICATION: "false"
      OFFER_THREAT_ENRICHMENT_SHADOW: "false"
      INVOICE_CACHE_HMAC_KEY: "ci-test-hmac-key"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build + import/boot smoke
        run: bash tools/docker_smoke.sh
