name: Android CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
      SIGURSCAN_ENABLE_AUDIO_ASR: "false"
      SIGURSCAN_ENABLE_LIVE_CALL: "false"
      SIGURSCAN_ENABLE_DIRECT_PROVIDER_KEYS: "false"
    steps:
      - name: Checkout with native submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew testDebugUnitTest

      - name: Verify V1 release manifest
        run: ./gradlew verifyV1ReleaseManifest

      - name: Build release APK
        run: ./gradlew assembleRelease
